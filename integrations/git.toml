id = "git"
name = "Git"
description = "Inspect local Git repositories — read commits, diffs, branches, file history, and blame without shell access"
category = "devtools"
icon = "🌿"
tags = ["git", "version-control", "commits", "diff", "history", "blame"]

[transport]
type = "stdio"
command = "uvx"
args = ["mcp-server-git", "--repository", "."]

[health_check]
interval_secs = 60
unhealthy_threshold = 3

setup_instructions = """
Requires `uv` (Python package manager):
- macOS/Linux: `curl -LsSf https://astral.sh/uv/install.sh | sh`
- Or: `pip install uv`

The `--repository .` argument uses the current working directory. To point at a specific repo:

```toml
[[mcp_servers]]
name = "git"

[mcp_servers.transport]
type = "stdio"
command = "uvx"
args = ["mcp-server-git", "--repository", "/path/to/your/repo"]
```
"""
