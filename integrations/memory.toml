id = "memory"
name = "Memory (Knowledge Graph)"
description = "Persistent knowledge graph that lets agents store and retrieve facts, entities, and relationships across sessions"
category = "ai"
icon = "🧠"
tags = ["memory", "knowledge-graph", "persistence", "facts", "entities"]

[transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory@latest"]

[health_check]
interval_secs = 60
unhealthy_threshold = 3

setup_instructions = """
No API key required. Stores a knowledge graph locally in JSON format.

Default storage: the server's working directory. To persist to a specific path, set:

```toml
[[mcp_servers]]
name = "memory"
env = ["MEMORY_FILE_PATH=/path/to/memory.json"]

[mcp_servers.transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory@latest"]
```
"""
