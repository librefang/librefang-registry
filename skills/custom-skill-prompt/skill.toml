## Custom Prompt Skill Example
##
## The prompt body and metadata (name, description) live in SKILL.md.
## This skill.toml only declares the runtime, input schema, and optional
## metadata that don't fit in Markdown frontmatter.
##
## To test: librefang skill test ./skills/custom-skill-prompt \
##   --input '{"topic": "Q1 planning", "duration_minutes": "30"}'
##
## For the full reference, see: docs/skill-development.md

[skill]
name = "meeting-agenda"
version = "0.1.0"
description = "Generate a structured meeting agenda from a topic and duration."
author = "your-name"
tags = ["meeting", "productivity", "example"]

[runtime]
type = "promptonly"

[input]
topic = { type = "string", description = "The meeting topic", required = true }
duration_minutes = { type = "string", description = "Meeting duration in minutes", required = true }
