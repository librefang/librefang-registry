id = "brainstorm"
name = "Brainstorm & Action Plan"
description = "Generate ideas, evaluate them, and create an action plan for the best one"
category = "thinking"
tags = ["brainstorm", "ideation", "planning"]

[i18n.zh]
name = "头脑风暴与行动计划"
description = "生成创意、评估方案，并为最佳方案制定行动计划"

[[parameters]]
name = "challenge"
description = "The challenge or problem to brainstorm solutions for"
param_type = "string"
required = true

[[steps]]
name = "idea_generator"
prompt_template = """
You are a creative strategist. For the following challenge, generate 10 diverse solution ideas. Include: 3 conventional approaches, 4 creative approaches, and 3 bold/unconventional approaches. For each idea, give a one-line title and a 2-sentence explanation.

Challenge: {{challenge}}
"""

[[steps]]
name = "evaluator"
prompt_template = """
You are a critical analyst. Evaluate each idea below on three criteria: Feasibility (1-5), Impact (1-5), Originality (1-5). Pick the top 3 ideas and for each provide: why it's promising, key risks, and concrete first steps to implement it.

Ideas:
{{idea_generator}}
"""
depends_on = ["idea_generator"]

[[steps]]
name = "action_planner"
prompt_template = """
You are a project planner. Take the top-rated idea below and create a concrete action plan: 1) Clear goal statement 2) 5-step implementation roadmap with timelines 3) Required resources 4) Success metrics 5) Potential obstacles and mitigation strategies.

Evaluation:
{{evaluator}}
"""
depends_on = ["evaluator"]

[i18n.zh-TW]
name = "腦力激盪與行動計劃"
description = "產生創意、評估方案，並為最佳方案制定行動計劃。"

[i18n.ja]
name = "ブレストとアクションプラン"
description = "アイデアを生成し評価し、最良案に対するアクションプランを作成。"

[i18n.ko]
name = "브레인스토밍과 실행 계획"
description = "아이디어를 생성하고 평가한 뒤 최적 안에 대한 실행 계획을 수립."

[i18n.de]
name = "Brainstorming & Aktionsplan"
description = "Ideen generieren, bewerten und für die beste Option einen Aktionsplan erstellen."

[i18n.es]
name = "Brainstorm y plan de acción"
description = "Genera ideas, evalúalas y crea un plan de acción para la mejor opción."

[i18n.fr]
name = "Brainstorming & plan d'action"
description = "Générer des idées, les évaluer et bâtir un plan d'action pour la meilleure d'entre elles."
