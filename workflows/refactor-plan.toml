id = "refactor-plan"
name = "Refactor Plan"
description = "Analyse code for quality issues, prioritise refactoring opportunities, and produce a safe incremental migration plan."
category = "engineering"
tags = ["refactoring", "code-quality", "engineering", "architecture"]

[i18n.zh]
name = "重构计划"
description = "分析代码质量问题，优先排序重构机会，制定安全的增量迁移计划。"

[[parameters]]
name = "code"
description = "Code to refactor"
param_type = "string"
required = true

[[parameters]]
name = "context"
description = "Why refactoring is being considered (performance, maintainability, tech debt)"
param_type = "string"
required = false
default = "general code quality improvement"

[[steps]]
name = "smell_analysis"
prompt_template = "You are a senior software architect performing a code quality audit. Identify all code smells and issues:\n\nFor each issue found:\n- Category: naming / duplication / complexity / coupling / abstraction / performance / security\n- Severity: critical / high / medium / low\n- Location: function/class name\n- Description: what is wrong\n- Impact: why it matters\n\nContext: {{context}}\n\nCode:\n{{code}}"

[[steps]]
name = "prioritised_opportunities"
prompt_template = "Prioritise refactoring opportunities by: (impact × risk_reduction) / effort.\n\nFor the top 5 opportunities:\n- What to change\n- Expected benefit\n- Estimated effort: hours\n- Risk level: low / medium / high\n- Prerequisites: what must be done first\n- Whether tests are needed before refactoring\n\nSmell analysis:\n{{smell_analysis}}"
depends_on = ["smell_analysis"]

[[steps]]
name = "migration_plan"
prompt_template = "Design an incremental refactoring plan that keeps the system working throughout:\n\n**Phase 1 — Safety net** (tests and coverage)\n**Phase 2 — Low-risk quick wins**\n**Phase 3 — Structural changes**\n**Phase 4 — Validation and cleanup**\n\nFor each phase:\n- Specific changes in order\n- How to verify nothing broke after each change\n- Rollback strategy\n- Definition of done\n\nAlso note: what NOT to change in this refactoring cycle.\n\nPrioritised opportunities:\n{{prioritised_opportunities}}"
depends_on = ["prioritised_opportunities"]
