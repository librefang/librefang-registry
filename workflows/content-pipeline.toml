id = "content-pipeline"
name = "Content Creation Pipeline"
description = "Research a topic, build a structured outline, write a full article, then edit for clarity, flow, and factual consistency."
category = "creation"
tags = ["content", "writing", "article", "research"]

[i18n.zh]
name = "内容创作流水线"
description = "调研主题，构建结构化提纲，撰写完整文章，再编辑润色以提升清晰度、流畅性和事实准确性。"

[[parameters]]
name = "topic"
description = "The topic to research and write about"
param_type = "string"
required = true

[[parameters]]
name = "audience"
description = "Target audience (e.g. general public, developers, executives, students)"
param_type = "string"
required = false
default = "general audience"

[[parameters]]
name = "word_count"
description = "Target word count for the article"
param_type = "string"
required = false
default = "800-1200"

[[parameters]]
name = "tone"
description = "Desired tone (informative, conversational, technical, persuasive)"
param_type = "string"
required = false
default = "informative"

[[steps]]
name = "researcher"
prompt_template = "You are a research journalist. Investigate the following topic for a {{audience}} audience:\n1. Background and context — why this topic matters now\n2. Key facts and data points (be specific)\n3. Multiple perspectives — mainstream view, contrarian view, expert consensus\n4. Recent developments or trends\n5. Concrete examples, case studies, or anecdotes\n6. Common misconceptions to address\n\nTopic: {{topic}}"

[[steps]]
name = "outline"
prompt_template = "You are a content strategist. Create a detailed article outline using the research below.\n\nInclude:\n- Three headline options (hook-driven, question-based, and statement-based)\n- Opening hook strategy\n- H2 sections with H3 subsections and the key point each section makes\n- Which research fact or example belongs in each section\n- Closing argument and call to action\n\nTarget: {{word_count}} words, {{tone}} tone, audience: {{audience}}\n\nResearch:\n{{researcher}}"
depends_on = ["researcher"]

[[steps]]
name = "writer"
prompt_template = "Write the full article following the outline. Requirements:\n- Use the best headline from the outline\n- Open with the hook strategy from the outline\n- Short paragraphs (3-4 sentences max)\n- Subheadings for each major section\n- Weave in the specific facts and examples from research — no vague generalities\n- Match the {{tone}} tone throughout\n- End with a concrete takeaway and CTA relevant to a {{audience}} reader\n- Target length: {{word_count}} words\n\nOutline:\n{{outline}}\n\nResearch:\n{{researcher}}"
depends_on = ["outline", "researcher"]

[[steps]]
name = "editor"
prompt_template = "You are a senior editor. Polish the article below:\n1. Fix grammar, punctuation, and spelling\n2. Tighten wordy or repetitive sentences\n3. Improve transitions between sections\n4. Flag any factual claims that seem unsupported and suggest how to strengthen them\n5. Verify the tone is consistent with '{{tone}}' throughout\n\nOutput the final polished article only, then add a brief editor's note listing the main changes made.\n\nDraft:\n{{writer}}"
depends_on = ["writer"]
