id = "meeting-summary"
name = "Meeting Summary & Action Items"
description = "Transform raw meeting notes or transcript into a structured summary, decisions log, and follow-up email."
category = "productivity"
tags = ["meeting", "notes", "productivity", "collaboration"]

[i18n.zh]
name = "会议纪要与行动项"
description = "将原始会议记录或转录文本整理为结构化摘要、决策日志和跟进邮件。"

[[parameters]]
name = "notes"
description = "Raw meeting notes or transcript"
param_type = "string"
required = true

[[parameters]]
name = "meeting_context"
description = "Meeting type, attendees, and goal (optional)"
param_type = "string"
required = false
default = ""

[[steps]]
name = "structured_summary"
prompt_template = "You are an executive assistant. From the raw meeting notes below, extract:\n\n**Key Discussion Points** — 3-7 bullet points on what was discussed\n**Decisions Made** — each decision with rationale and who decided\n**Open Questions** — unresolved items that need follow-up\n**Blockers & Risks** — anything flagged as blocking progress\n\nContext: {{meeting_context}}\n\nNotes:\n{{notes}}"

[[steps]]
name = "action_items"
prompt_template = "Extract all action items from the meeting. For each:\n- Action: specific, measurable task\n- Owner: person responsible (use name from notes)\n- Due date: explicit date or relative (e.g. 'by next Friday')\n- Priority: High / Medium / Low\n- Dependencies: what must happen first\n\nFormat as a table.\n\nSummary:\n{{structured_summary}}\n\nNotes:\n{{notes}}"
depends_on = ["structured_summary"]

[[steps]]
name = "followup_email"
prompt_template = "Write a professional follow-up email to send to all attendees. Include:\n- Subject line\n- Brief recap (2-3 sentences)\n- Decisions section\n- Action items table (owner, task, due date)\n- Next steps / next meeting placeholder\n\nKeep tone professional but concise. Use the attendees' first names.\n\nSummary:\n{{structured_summary}}\n\nAction items:\n{{action_items}}"
depends_on = ["structured_summary", "action_items"]
