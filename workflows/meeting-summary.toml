id = "meeting-summary"
name = "Meeting Summary & Action Items"
description = "Transform raw meeting notes or transcript into a structured summary, decisions log, and follow-up email."
category = "productivity"
tags = ["meeting", "notes", "productivity", "collaboration"]

[i18n.zh]
name = "会议纪要与行动项"
description = "将原始会议记录或转录文本整理为结构化摘要、决策日志和跟进邮件。"

[[parameters]]
name = "notes"
description = "Raw meeting notes or transcript"
param_type = "string"
required = true

[[parameters]]
name = "meeting_context"
description = "Meeting type, attendees, and goal (optional)"
param_type = "string"
required = false
default = ""

[[steps]]
name = "structured_summary"
prompt_template = """
You are an executive assistant. From the raw meeting notes below, extract:

**Key Discussion Points** — 3-7 bullet points on what was discussed
**Decisions Made** — each decision with rationale and who decided
**Open Questions** — unresolved items that need follow-up
**Blockers & Risks** — anything flagged as blocking progress

Context: {{meeting_context}}

Notes:
{{notes}}
"""

[[steps]]
name = "action_items"
prompt_template = """
Extract all action items from the meeting. For each:
- Action: specific, measurable task
- Owner: person responsible (use name from notes)
- Due date: explicit date or relative (e.g. 'by next Friday')
- Priority: High / Medium / Low
- Dependencies: what must happen first

Format as a table.

Summary:
{{structured_summary}}

Notes:
{{notes}}
"""
depends_on = ["structured_summary"]

[[steps]]
name = "followup_email"
prompt_template = """
Write a professional follow-up email to send to all attendees. Include:
- Subject line
- Brief recap (2-3 sentences)
- Decisions section
- Action items table (owner, task, due date)
- Next steps / next meeting placeholder

Keep tone professional but concise. Use the attendees' first names.

Summary:
{{structured_summary}}

Action items:
{{action_items}}
"""
depends_on = ["structured_summary", "action_items"]

[i18n.zh-TW]
name = "會議摘要與行動項目"
description = "將原始會議記錄或逐字稿整理為結構化摘要、決策日誌與後續追蹤郵件。"

[i18n.ja]
name = "会議サマリとアクションアイテム"
description = "議事録や文字起こしを構造化サマリ、決定事項リスト、フォローアップメールに変換。"

[i18n.ko]
name = "회의 요약 및 액션 아이템"
description = "원본 회의 메모나 녹취를 구조화된 요약, 결정 로그, 팔로업 이메일로 변환."

[i18n.de]
name = "Meeting-Zusammenfassung & Action Items"
description = "Rohe Meeting-Notizen oder Transkripte in strukturierte Zusammenfassung, Entscheidungsprotokoll und Follow-up-Mail verwandeln."

[i18n.es]
name = "Resumen de reuniones y acciones"
description = "Transforma notas o transcripciones en un resumen estructurado, registro de decisiones y correo de seguimiento."

[i18n.fr]
name = "Compte-rendu et actions"
description = "Transformer des notes ou transcriptions brutes en compte-rendu structuré, journal de décisions et e-mail de suivi."
