id = "weekly-report"
name = "Weekly Report Generator"
description = "Turn raw work notes into a polished weekly report with highlights, metrics, blockers, and next week's priorities."
category = "productivity"
tags = ["report", "weekly", "productivity", "management"]

[i18n.zh]
name = "周报生成器"
description = "将零散工作笔记整理为规范周报，包含亮点、指标、阻塞项和下周计划。"

[[parameters]]
name = "work_notes"
description = "Raw work notes, bullet points, or activity log for the week"
param_type = "string"
required = true

[[parameters]]
name = "team_or_role"
description = "Your team name or role (used to frame context appropriately)"
param_type = "string"
required = false
default = ""

[[parameters]]
name = "audience"
description = "Who will read this report (manager, team, executive)"
param_type = "string"
required = false
default = "manager"

[[steps]]
name = "extract"
prompt_template = "You are an executive assistant. Parse the following raw work notes and extract every item into structured categories:\n\n**Completed** — fully done tasks (include measurable outcomes if mentioned)\n**In Progress** — work started but not finished (include % complete or next milestone if available)\n**Blockers** — anything preventing progress, and who or what is blocking\n**Decisions Made** — choices or agreements reached this week\n**Metrics** — any numbers mentioned (velocity, usage, revenue, bugs closed, etc.)\n**Upcoming** — planned work mentioned for next week\n\nDo not summarise or rephrase — extract faithfully.\n\nTeam/Role: {{team_or_role}}\n\nRaw notes:\n{{work_notes}}"

[[steps]]
name = "report_writer"
prompt_template = "Write a polished weekly report for a {{audience}} audience. Tone should be professional and concise — no padding.\n\n## Highlights\nTop 3 achievements this week, each in one sentence with measurable impact where available.\n\n## Progress\nGrouped by project or workstream. For each: what was done, current status, and any dependency.\n\n## Metrics\nKey numbers from the week. If none were provided, omit this section.\n\n## Blockers & Risks\nEach blocker: description, impact, owner, and requested action.\n\n## Next Week\nTop 3-5 priorities with owner and expected outcome.\n\n## Notes\nDecisions made, process changes, or anything the audience should be aware of.\n\nExtracted data:\n{{extract}}"
depends_on = ["extract"]
