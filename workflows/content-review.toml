id = "content-review"
name = "Content Review"
description = "Multi-agent content review pipeline that drafts, reviews for quality and accuracy, then produces a final edited version incorporating feedback."
category = "creation"
tags = ["content", "review", "writing", "editing"]

[i18n.zh]
name = "内容审校"
description = "多智能体内容审校流水线，先起草内容，再分别审查质量和准确性，最后综合反馈生成终稿。"

[[parameters]]
name = "topic"
description = "The topic or subject to write about"
param_type = "string"
required = true

[[parameters]]
name = "tone"
description = "Desired tone (formal, casual, technical, persuasive)"
param_type = "string"
required = false
default = "formal"

[[parameters]]
name = "word_count"
description = "Target word count for the content"
param_type = "number"
required = false
default = 500

[[steps]]
name = "draft"
prompt_template = "Write a {{tone}} article about {{topic}} with approximately {{word_count}} words. Include a clear introduction, well-structured body, and conclusion. Use concrete examples where appropriate."

[[steps]]
name = "review_quality"
prompt_template = """
Review the following draft for writing quality. Evaluate clarity, coherence, grammar, tone consistency (target: {{tone}}), and overall readability. Provide specific, actionable feedback with line-level suggestions.

Draft:
{{draft}}
"""
depends_on = ["draft"]

[[steps]]
name = "review_accuracy"
prompt_template = """
Review the following draft for factual accuracy and logical consistency. Flag any claims that appear unsupported, statistics that need citation, logical fallacies, or misleading statements. List each issue with a suggested correction.

Draft:
{{draft}}
"""
depends_on = ["draft"]

[[steps]]
name = "final_edit"
prompt_template = """
Produce a final edited version of the draft below, incorporating the quality and accuracy feedback. Preserve the original voice and intent while addressing all identified issues.

Original draft:
{{draft}}

Quality feedback:
{{review_quality}}

Accuracy feedback:
{{review_accuracy}}
"""
depends_on = ["review_quality", "review_accuracy"]

[i18n.zh-TW]
name = "內容審校"
description = "多智能體內容審校流水線，先起草內容，再分別審查品質與準確性，最後綜合回饋產生終稿。"

[i18n.ja]
name = "コンテンツレビュー"
description = "複数 Agent による内容レビュー。下書きを作成し、品質と正確性をレビュー、フィードバックを反映した最終版を生成。"

[i18n.ko]
name = "콘텐츠 검토"
description = "다중 에이전트 콘텐츠 검토 파이프라인. 초안을 작성하고 품질과 정확성을 검토한 뒤 피드백을 반영한 최종본을 생성."

[i18n.de]
name = "Content-Review"
description = "Multi-Agent-Review-Pipeline: Entwurf erstellen, Qualität und Korrektheit prüfen und eine endgültige Fassung mit eingearbeitetem Feedback liefern."

[i18n.es]
name = "Revisión de contenido"
description = "Pipeline multiagente que redacta, revisa calidad y precisión y produce una versión final con la retroalimentación incorporada."

[i18n.fr]
name = "Revue de contenu"
description = "Pipeline multi-agent : rédige, contrôle la qualité et la précision, puis produit une version finale intégrant les retours."
