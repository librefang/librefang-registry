id = "learning-plan"
name = "Personalised Learning Plan"
description = "Assess current knowledge, identify gaps, and build a structured learning roadmap with resources and milestones."
category = "productivity"
tags = ["learning", "education", "planning", "productivity"]

[i18n.zh]
name = "个性化学习计划"
description = "评估当前知识水平，识别差距，构建带资源和里程碑的结构化学习路线图。"

[[parameters]]
name = "skill"
description = "The skill or subject to learn"
param_type = "string"
required = true

[[parameters]]
name = "current_level"
description = "Your current knowledge and experience with this topic"
param_type = "string"
required = false
default = "complete beginner"

[[parameters]]
name = "goal"
description = "What you want to be able to do once you've learned it"
param_type = "string"
required = false
default = "professional proficiency"

[[parameters]]
name = "time_available"
description = "Hours per week available for learning"
param_type = "string"
required = false
default = "5 hours per week"

[[steps]]
name = "gap_analysis"
prompt_template = "You are an expert educator in {{skill}}. Analyse the learner's situation:\n1. **Knowledge map** — the full topic broken into sub-skills and concepts\n2. **Current position** — what they likely know given their stated level\n3. **Target position** — what they need to know to reach their goal\n4. **Critical gaps** — the 5 most important things to learn first\n5. **Common pitfalls** — mistakes beginners make, concepts people find hardest\n\nSkill: {{skill}}\nCurrent level: {{current_level}}\nGoal: {{goal}}"

[[steps]]
name = "roadmap"
prompt_template = "Design a learning roadmap divided into phases. For each phase:\n- Name and duration estimate\n- Learning objectives (what they'll be able to do)\n- Core concepts to master\n- 3-5 specific resources (books, courses, docs, tutorials — real names where possible)\n- Practice project or exercise\n- How to know the phase is complete (milestone)\n\nTime available: {{time_available}}\n\nGap analysis:\n{{gap_analysis}}"
depends_on = ["gap_analysis"]

[[steps]]
name = "week1_plan"
prompt_template = "Create a concrete day-by-day plan for the first week of learning. For each day:\n- Specific topic to cover\n- Exact resource to use (chapter, video, section)\n- Time estimate\n- Exercise or thing to build/practice\n- End-of-day check: how to verify understanding\n\nAssume {{time_available}} is available.\n\nRoadmap:\n{{roadmap}}"
depends_on = ["roadmap"]
