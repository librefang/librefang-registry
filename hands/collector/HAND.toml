id = "collector"
version = "1.0.0"
name = "Collector Hand"
description = "Autonomous intelligence collector — monitors any target continuously with change detection and knowledge graphs"

category = "data"
icon = "🔍"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

[routing]
aliases = [
  "monitor changes",
  "track updates",
  "collect intelligence",
  "osint",
  "change detection",
  "gather info",
  "market intelligence",
  "competitive analysis",
]
weak_aliases = [
  "watch",
  "signals",
  "continuous monitoring",
  "surveillance",
  "intel",
  "news monitoring",
]

