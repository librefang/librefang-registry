format = "number"

[[dashboard.metrics]]
label = "Active Tasks"
memory_key = "devteam_active_tasks"
format = "number"

[[dashboard.metrics]]
label = "Bugs Found by QA"
memory_key = "devteam_bugs_found"
format = "number"

