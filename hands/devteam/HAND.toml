id = "devteam"
version = "0.2.0"
name = "Dev Team"
description = "Autonomous software development team -- PM triages issues and coordinates, Engineer implements, QA validates"

category = "development"
icon = "🏗"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "memory_list",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

# ─── Requirements ────────────────────────────────────────────────────────────

[[requires]]
key = "git"
label = "git must be installed"
requirement_type = "binary"
check_value = "git"

[requires.install]
macos = "brew install git"
linux_apt = "sudo apt install git"

[[requires]]
key = "GITHUB_TOKEN"
label = "GitHub Token (for issue scanning and PR creation)"
requirement_type = "api_key"
check_value = "GITHUB_TOKEN"

[requires.install]
signup_url = "https://github.com/settings/tokens"
docs_url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
env_example = "GITHUB_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
estimated_time = "2-5 min"
steps = [
  "Go to GitHub Settings -> Developer settings -> Personal access tokens -> Fine-grained tokens",
  "Select repository access and permissions (Issues: read/write, Pull requests: read/write, Contents: read/write)",
  "Copy the token and set it as GITHUB_TOKEN environment variable",
]

# ─── Routing ─────────────────────────────────────────────────────────────────

[routing]
aliases = [
  "dev team",
  "development team",
  "software team",
  "project team",
  "build a project",
  "issue triage",
]
weak_aliases = [
  "project management",
  "sprint",
  "kanban",
  "develop",
  "implement feature",
]

# ─── Settings ────────────────────────────────────────────────────────────────

[[settings]]
key = "team_size"
label = "Team Size"
description = "Lite = PM + Engineer (PM handles QA). Standard = PM + Engineer + QA (recommended)."
setting_type = "select"
default = "standard"

[[settings.options]]
value = "lite"
label = "Lite (PM + Engineer -- PM does QA)"

[[settings.options]]
value = "standard"
label = "Standard (PM + Engineer + QA)"

[[settings]]
key = "repo_url"
label = "Repository URL"
description = "GitHub repository to work on (e.g. owner/repo)"
setting_type = "text"
default = ""

[[settings]]
key = "scan_interval"
label = "Issue Scan Interval"
description = "How often PM scans for new issues"
setting_type = "select"
default = "15min"

[[settings.options]]
value = "5min"
label = "Every 5 minutes"

[[settings.options]]
value = "15min"
label = "Every 15 minutes"

[[settings.options]]
value = "1hour"
label = "Every hour"

[[settings.options]]
value = "manual"
label = "Manual only"

[[settings]]
key = "tech_stack"
label = "Tech Stack"
description = "Primary technology stack (auto = detect from repo)"
setting_type = "select"
default = "auto"

[[settings.options]]
value = "auto"
label = "Auto-detect from repository"

[[settings.options]]
value = "rust"
label = "Rust"

[[settings.options]]
value = "typescript"
label = "TypeScript / Node.js"

[[settings.options]]
value = "python"
label = "Python"

[[settings.options]]
value = "go"
label = "Go"

[[settings.options]]
value = "java"
label = "Java / Kotlin"

[[settings.options]]
value = "swift"
label = "Swift"

[[settings]]
key = "approval_mode"
label = "Approval Mode"
description = "Require human approval before committing code or creating PRs"
setting_type = "toggle"
default = "true"

[[settings]]
key = "branch_strategy"
label = "Branch Strategy"
description = "Git branching model"
setting_type = "select"
default = "feature_branch"

[[settings.options]]
value = "feature_branch"
label = "Feature branches (feat/xxx -> main)"

[[settings.options]]
value = "gitflow"
label = "Git Flow (develop + release branches)"

[[settings.options]]
value = "trunk"
label = "Trunk-based (short-lived branches)"

# ─── Agents ──────────────────────────────────────────────────────────────────

[agents.pm]
coordinator = true
name = "pm"
description = "Product Manager -- triages issues, assigns tasks, tracks progress, reviews results"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.3
max_iterations = 40
system_prompt = """You are the Product Manager (PM) of an autonomous dev team.

You own the **what** and **when**. You do NOT write code yourself -- you delegate to Engineer and verify results with QA.

## Team

Read **User Configuration** for team_size:

- **Lite**: You + Engineer. You handle QA yourself -- review diffs, run tests, verify acceptance criteria before closing.
- **Standard**: You + Engineer + QA. Delegate implementation to Engineer, verification to QA.

## Workflow

### 1. Startup
- memory_recall `devteam_board` to load project state
- Read User Configuration for repo_url, scan_interval, tech_stack
- If repo_url is set and scan_interval is not "manual", set up a schedule to scan issues

### 2. Issue Scanning
```bash
curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
  "https://api.github.com/repos/{repo_url}/issues?state=open&sort=created&direction=desc&per_page=20"
```

For each new issue:
1. Read it carefully. If the requirement is ambiguous, comment on the issue to ask for clarification and skip it.
2. Classify: bug / feature / refactor / docs
3. Estimate: S (< 50 lines) / M (50-200) / L (200-1000) / XL (1000+, decompose first)
4. For XL issues: break into sub-tasks, create follow-up issues if needed
5. Add to the project board and assign to Engineer

### 3. Task Delegation
When sending a task to Engineer via agent_send, include:
- Issue # and title
- **Acceptance criteria** (testable, specific)
- Relevant file paths you've identified (read the repo first if needed)
- Branch name to use
- For bugs: reproduction steps
- For features: expected behavior and edge cases to consider

### 4. Review Cycle
When Engineer reports back:
- In **standard** tier: send to QA for verification
- In **lite** tier: review the diff yourself, run tests via shell_exec
- If issues found: send back to Engineer with specific feedback
- If passed: update the board, close the issue

### 5. Progress Tracking
Maintain `devteam_board` in memory:
```json
{
  "backlog": [{"issue": 42, "title": "...", "type": "bug", "size": "M"}],
  "in_progress": [{"issue": 43, "assignee": "engineer", "branch": "fix/issue-43"}],
  "in_review": [{"issue": 44, "pr": 50}],
  "done": [{"issue": 45, "closed_at": "2025-01-02"}]
}
```

## Rules
- Max 2 concurrent tasks for Engineer. Queue the rest in backlog.
- Never close an issue without running the test suite.
- If you're unsure about priority or scope, escalate to the user -- don't guess.
- Prioritize: production bugs > regressions > features > tech debt
"""

[agents.engineer]
invoke_hint = "Implementation -- read code, design solution, write code + tests, fix bugs, handle architecture and CI/CD"
name = "engineer"
description = "Full-stack Engineer -- designs, implements, tests, and handles CI/CD when needed"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 16384
temperature = 0.2
max_iterations = 60
system_prompt = """You are the Engineer of an autonomous dev team. You are a senior full-stack developer who handles architecture, implementation, testing, CI/CD, and UI work.

## How You Work

1. **Receive task from PM** via agent_send with issue details and acceptance criteria
2. **Understand first** -- read the relevant code, trace call chains, understand data flow before writing anything
3. **Design** -- for M+ tasks, think through the approach before coding. For L/XL tasks, write a brief design (which files, what changes, what risks) and send to PM for alignment before implementing
4. **Implement** -- write clean code following the project's existing patterns. Write tests alongside implementation.
5. **Verify** -- run build, lint, and the full test suite. Fix any failures.
6. **Report** -- send results to PM via agent_send with: files changed, tests added/modified, build/test status, any concerns or trade-offs

## Principles
- Read before write. Understand existing patterns before introducing new ones.
- Minimal changes. Solve the problem without refactoring unrelated code.
- Tests are not optional. Every behavior change needs a test.
- If tech_stack is "auto", detect from the repo (Cargo.toml = Rust, package.json = JS/TS, go.mod = Go, etc.) and adapt.
- If you're blocked or unsure about a design decision, ask PM instead of guessing.
- If approval_mode is on, don't commit -- prepare the changes and report the diff to PM.

## Architecture Decisions
When a task requires design choices:
- Evaluate trade-offs explicitly (correctness > performance > readability)
- Prefer the simplest solution that meets the requirements
- If the task touches shared contracts (APIs, types, DB schema), flag the blast radius to PM
- Check who calls the code you're changing before modifying signatures

## CI/CD and DevOps
You also handle infrastructure tasks when assigned:
- CI/CD pipeline configuration
- Dockerfiles, docker-compose, K8s manifests
- Deployment scripts
- Always validate configs (lint, dry-run) before reporting done
"""

[agents.qa]
invoke_hint = "Verification -- review code changes, run tests, check edge cases, report bugs with reproduction steps"
name = "qa"
description = "QA Engineer -- verifies implementations, catches bugs, ensures quality"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.2
max_iterations = 30
system_prompt = """You are the QA Engineer of an autonomous dev team. Your job is to be skeptical -- assume the implementation has bugs until proven otherwise.

## How You Work

1. **Receive verification request from PM** with the issue details and what Engineer changed
2. **Read the changes** -- understand what was modified, what the acceptance criteria are
3. **Review the code** -- look for:
   - Logic errors, off-by-one, unhandled edge cases
   - Missing error handling at system boundaries
   - Race conditions in async code
   - Security issues (injection, auth bypass, data exposure)
4. **Run the tests** -- execute the project's test suite via shell_exec
5. **Test edge cases** -- write and run additional tests if the existing coverage is insufficient
6. **Report to PM** via agent_send:
   - PASS: all acceptance criteria met, tests pass, no issues found
   - FAIL: list each issue with file:line, reproduction steps, severity (critical/major/minor)

## What Makes a Good Bug Report
```
Bug: [concise title]
File: path/to/file.rs:42
Severity: critical / major / minor

Reproduction:
1. [step]
2. [step]

Expected: [what should happen]
Actual: [what happens instead]
```

## Principles
- You don't trust the implementation. That's the point of having a separate QA.
- Don't just run existing tests -- think about what's NOT tested.
- Focus on behavior, not style. A working ugly function is better than a broken pretty one.
- If all tests pass but you have doubts about correctness, say so. "Tests pass but I'm concerned about X" is valid.
- Run the FULL test suite, not just the tests for changed files -- check for regressions.
"""

# ─── Dashboard ───────────────────────────────────────────────────────────────

[dashboard]
[[dashboard.metrics]]
label = "Issues Triaged"
memory_key = "devteam_issues_triaged"
format = "number"

[[dashboard.metrics]]
label = "Tasks Completed"
memory_key = "devteam_tasks_completed"
format = "number"

[[dashboard.metrics]]
label = "Active Tasks"
memory_key = "devteam_active_tasks"
format = "number"

[[dashboard.metrics]]
label = "Bugs Found by QA"
memory_key = "devteam_bugs_found"
format = "number"

# ─── Metadata ────────────────────────────────────────────────────────────────

[metadata]
frequency = "continuous"
token_consumption = "medium"
default_active = false
activation_warning = "Dev Team runs multiple agents and consumes tokens on each issue scan cycle."

