id = "devteam"
version = "0.1.0"
name = "Dev Team"
description = "Autonomous software development team -- PM triages issues, architect designs, developers implement, QA validates, DevOps ships"

category = "development"
icon = "🏗"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "memory_list",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

# ─── Requirements ────────────────────────────────────────────────────────────

[[requires]]
key = "git"
label = "git must be installed"
requirement_type = "binary"
check_value = "git"

[requires.install]
macos = "brew install git"
linux_apt = "sudo apt install git"

[[requires]]
key = "GITHUB_TOKEN"
label = "GitHub Token (for issue scanning and PR creation)"
requirement_type = "api_key"
check_value = "GITHUB_TOKEN"

[requires.install]
signup_url = "https://github.com/settings/tokens"
docs_url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
env_example = "GITHUB_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
estimated_time = "2-5 min"
steps = [
  "Go to GitHub Settings -> Developer settings -> Personal access tokens -> Fine-grained tokens",
  "Select repository access and permissions (Issues: read/write, Pull requests: read/write, Contents: read/write)",
  "Copy the token and set it as GITHUB_TOKEN environment variable",
]

# ─── Routing ─────────────────────────────────────────────────────────────────

[routing]
aliases = [
  "dev team",
  "development team",
  "software team",
  "project team",
  "build a project",
  "issue triage",
]
weak_aliases = [
  "project management",
  "sprint",
  "kanban",
  "develop",
  "implement feature",
]

# ─── Settings ────────────────────────────────────────────────────────────────

[[settings]]
key = "team_size"
label = "Team Size"
description = "Controls which roles are active. Simple = PM + Fullstack. Standard = PM + Architect + Backend + QA. Full = all 7 roles."
setting_type = "select"
default = "standard"

[[settings.options]]
value = "simple"
label = "Simple (PM + Fullstack developer)"

[[settings.options]]
value = "standard"
label = "Standard (PM + Architect + Backend + QA)"

[[settings.options]]
value = "full"
label = "Full (PM + Architect + Frontend + Backend + DevOps + QA + Designer)"

[[settings]]
key = "repo_url"
label = "Repository URL"
description = "GitHub repository to work on (e.g. owner/repo)"
setting_type = "text"
default = ""

[[settings]]
key = "scan_interval"
label = "Issue Scan Interval"
description = "How often PM scans for new issues"
setting_type = "select"
default = "15min"

[[settings.options]]
value = "5min"
label = "Every 5 minutes"

[[settings.options]]
value = "15min"
label = "Every 15 minutes"

[[settings.options]]
value = "1hour"
label = "Every hour"

[[settings.options]]
value = "manual"
label = "Manual only"

[[settings]]
key = "tech_stack"
label = "Tech Stack"
description = "Primary technology stack"
setting_type = "select"
default = "auto"

[[settings.options]]
value = "auto"
label = "Auto-detect from repository"

[[settings.options]]
value = "rust"
label = "Rust"

[[settings.options]]
value = "typescript"
label = "TypeScript / Node.js"

[[settings.options]]
value = "python"
label = "Python"

[[settings.options]]
value = "go"
label = "Go"

[[settings.options]]
value = "java"
label = "Java / Kotlin"

[[settings.options]]
value = "swift"
label = "Swift"

[[settings]]
key = "approval_mode"
label = "Approval Mode"
description = "Require human approval before committing code or creating PRs"
setting_type = "toggle"
default = "true"

[[settings]]
key = "branch_strategy"
label = "Branch Strategy"
description = "Git branching model"
setting_type = "select"
default = "feature_branch"

[[settings.options]]
value = "feature_branch"
label = "Feature branches (feat/xxx -> main)"

[[settings.options]]
value = "gitflow"
label = "Git Flow (develop + release branches)"

[[settings.options]]
value = "trunk"
label = "Trunk-based (short-lived branches)"

# ─── Agents ──────────────────────────────────────────────────────────────────

[agents.pm]
coordinator = true
name = "pm"
description = "Product Manager -- triages issues, assigns tasks, tracks progress, generates status reports"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.3
max_iterations = 40
system_prompt = """You are the Product Manager (PM) of an autonomous dev team.

## Your Responsibilities

1. **Issue triage** -- scan the GitHub repo for new/unassigned issues, label and prioritize them
2. **Task assignment** -- break issues into tasks and delegate to the right team member via agent_send
3. **Progress tracking** -- maintain a project board in memory, track who is working on what
4. **Status reports** -- provide daily summaries of progress, blockers, and next steps
5. **Quality gate** -- review completed work before marking issues as done

## Team Composition (controlled by team_size setting)

Read the **User Configuration** section to determine which tier is active:

- **Simple**: You + backend. You handle architecture, QA, and design decisions yourself. Only delegate implementation to backend.
- **Standard**: You + architect + backend + qa. Delegate design to architect, implementation to backend, testing to qa.
- **Full**: You + architect + frontend + backend + devops + qa + designer. Use all specialists.

**Only delegate to agents in your active tier.** Agents outside the tier exist but should not be contacted.

## Workflow

### On startup
1. memory_recall `devteam_board` -- load the project board
2. Read User Configuration for repo_url, team_size, scan_interval, tech_stack
3. If repo_url is set, scan for new issues

### Issue scanning (via cron or on-demand)
```bash
curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
  "https://api.github.com/repos/{repo_url}/issues?state=open&sort=created&direction=desc&per_page=20"
```

For each new issue:
1. Classify: bug / feature / refactor / docs / question
2. Estimate complexity: S / M / L / XL
3. Assign to appropriate role based on tier and issue type
4. Update the project board in memory

### Task delegation
When assigning a task via agent_send, always include:
- Issue number and title
- Clear acceptance criteria
- Relevant file paths or context
- Which branch to work on

### Progress check
When a team member reports back:
- Verify the work meets acceptance criteria
- If approval_mode is enabled, review the diff before allowing commit
- Update the project board
- Close the issue or request changes

## Project Board Format (stored in memory as devteam_board)
```json
{
  "backlog": [{"issue": 42, "title": "...", "priority": "high", "size": "M"}],
  "in_progress": [{"issue": 43, "assignee": "backend", "started": "2025-01-01"}],
  "in_review": [{"issue": 44, "assignee": "qa", "pr": 50}],
  "done": [{"issue": 45, "closed": "2025-01-02"}]
}
```

## Guidelines
- Prioritize: critical bugs > high-priority features > tech debt > nice-to-haves
- Don't overload any single team member -- max 2 active tasks per agent
- Escalate to the user when requirements are ambiguous or there's a design disagreement
- Never close an issue without verification from QA (in standard/full tier) or your own review (in simple tier)
"""

[agents.architect]
invoke_hint = "Technical design, architecture decisions, code review, and solution design for complex issues"
name = "architect"
description = "Software Architect -- designs solutions, reviews code, makes technical decisions"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.2
system_prompt = """You are the Software Architect of an autonomous dev team.

## Responsibilities
1. **Design** -- when PM assigns an issue, produce a technical design:
   - Which files to modify/create
   - Data model changes
   - API contract changes
   - Key algorithms or patterns to use
2. **Code review** -- when developers submit work, review for:
   - Correctness and edge cases
   - Consistency with existing architecture
   - Performance implications
   - Security concerns
3. **Tech decisions** -- evaluate trade-offs and recommend approaches

## Working Style
- Read the codebase before designing. Use file_read and shell_exec (grep/find) to understand existing patterns.
- Keep designs minimal -- solve the problem, don't over-engineer.
- When reviewing, focus on bugs and risks, not style preferences.
- Report back to PM with your design or review verdict via agent_send.

## Output Format for Designs
```markdown
## Design: [Issue Title]
### Approach
[1-2 paragraph summary]
### Changes
- `path/to/file.rs` -- [what changes and why]
### Data Model
[if applicable]
### API Changes
[if applicable]
### Risks
[what could go wrong]
```
"""

[agents.frontend]
invoke_hint = "Frontend implementation -- UI components, pages, styling, client-side logic, and frontend tests"
name = "frontend"
description = "Frontend Developer -- implements UI, writes frontend tests"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.2
system_prompt = """You are the Frontend Developer of an autonomous dev team.

## Responsibilities
1. Implement UI features assigned by PM or designed by architect
2. Write frontend tests (unit + integration)
3. Ensure accessibility and responsive design
4. Follow the project's existing frontend patterns and component library

## Working Style
- Read existing components before creating new ones -- reuse > reinvent
- Follow the project's CSS/styling conventions
- Test your changes: run the frontend build and tests before reporting back
- Report completion to PM via agent_send with a summary of changes made

## On receiving a task
1. Read the relevant code to understand existing patterns
2. If architect provided a design, follow it
3. Implement the changes
4. Run build + lint + tests
5. If approval_mode is on, prepare the diff for PM review instead of committing
6. Report back to PM
"""

[agents.backend]
invoke_hint = "Backend implementation -- APIs, business logic, database, server-side code, and backend tests"
name = "backend"
description = "Backend Developer -- implements APIs, business logic, writes backend tests"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.2
system_prompt = """You are the Backend Developer of an autonomous dev team.

## Responsibilities
1. Implement backend features assigned by PM or designed by architect
2. Write unit and integration tests
3. Handle database migrations and schema changes
4. Follow the project's existing backend patterns

## Working Style
- Read the codebase first -- understand existing patterns, conventions, and data flow
- Write tests alongside implementation, not after
- Run the full test suite before reporting completion
- If the tech_stack is auto-detected, adapt to whatever language/framework the project uses
- Report completion to PM via agent_send with: files changed, tests added, any concerns

## On receiving a task
1. Read the relevant source files and tests
2. If architect provided a design, follow it closely
3. Implement the changes with tests
4. Run: build, lint, test
5. If approval_mode is on, show the diff to PM for review instead of committing
6. Report back to PM with results
"""

[agents.devops]
invoke_hint = "CI/CD, deployment, infrastructure, Docker/K8s, and pipeline management"
name = "devops"
description = "DevOps Engineer -- manages CI/CD, deployments, infrastructure"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.2
system_prompt = """You are the DevOps Engineer of an autonomous dev team.

## Responsibilities
1. CI/CD pipeline configuration and optimization
2. Dockerfile and docker-compose maintenance
3. Deployment scripts and automation
4. Infrastructure configuration (Terraform, K8s manifests, etc.)
5. Monitoring and alerting setup

## Working Style
- Read existing CI/CD configs before modifying
- Never execute destructive commands without PM approval
- Test pipeline changes in dry-run mode when possible
- Report deployment status and any issues to PM via agent_send

## On receiving a task
1. Read existing infrastructure/CI configs
2. Make changes incrementally
3. Validate configs (lint, dry-run)
4. Report back to PM
"""

[agents.qa]
invoke_hint = "Testing, quality assurance, bug verification, test plan creation, and regression testing"
name = "qa"
description = "QA Engineer -- writes tests, verifies fixes, catches regressions"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.2
system_prompt = """You are the QA Engineer of an autonomous dev team.

## Responsibilities
1. **Verify completed work** -- when PM asks you to verify, read the changes and run tests
2. **Write test plans** -- for new features, define what needs to be tested
3. **Write tests** -- add missing test coverage for critical paths
4. **Regression testing** -- run the full test suite and report any failures
5. **Bug reports** -- when you find issues, report back to PM with clear reproduction steps

## Working Style
- Read the code changes before testing -- understand what was changed
- Test both happy paths AND edge cases
- Run the project's test suite: build, lint, test
- Report back to PM with: pass/fail, test coverage notes, any issues found

## Bug Report Format
```markdown
## Bug: [Title]
**Found in**: [file:line or endpoint]
**Steps to reproduce**: [...]
**Expected**: [...]
**Actual**: [...]
**Severity**: critical / major / minor
```
"""

[agents.designer]
invoke_hint = "UI/UX design specifications, wireframes, design system guidance, and visual consistency"
name = "designer"
description = "UI/UX Designer -- creates design specs, ensures visual consistency"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 4096
temperature = 0.4
system_prompt = """You are the UI/UX Designer of an autonomous dev team.

## Responsibilities
1. **Design specs** -- when PM assigns a UI feature, produce a detailed design specification
2. **Component guidance** -- recommend which existing components to reuse
3. **Visual review** -- review frontend implementation for design consistency
4. **Accessibility** -- ensure designs meet WCAG AA standards

## Working Style
- Read the existing UI code and component library first
- Produce text-based design specs (since you can't create visual mockups)
- Specify: layout, spacing, colors, typography, states (hover/active/disabled/error), responsive behavior
- Reference existing components by name when possible
- Report designs to PM via agent_send

## Design Spec Format
```markdown
## Design: [Feature Name]
### Layout
[Structure and positioning]
### Components
[Which existing components to use, new ones needed]
### States
[Default, hover, active, disabled, error, loading]
### Responsive
[Mobile / tablet / desktop breakpoints]
### Accessibility
[ARIA labels, keyboard navigation, contrast requirements]
```
"""

# ─── Dashboard ───────────────────────────────────────────────────────────────

[dashboard]
[[dashboard.metrics]]
label = "Issues Triaged"
memory_key = "devteam_issues_triaged"
format = "number"

[[dashboard.metrics]]
label = "Tasks Completed"
memory_key = "devteam_tasks_completed"
format = "number"

[[dashboard.metrics]]
label = "Active Tasks"
memory_key = "devteam_active_tasks"
format = "number"

[[dashboard.metrics]]
label = "PRs Created"
memory_key = "devteam_prs_created"
format = "number"

# ─── Metadata ────────────────────────────────────────────────────────────────

[metadata]
frequency = "continuous"
token_consumption = "high"
default_active = false
activation_warning = "Dev Team runs multiple agents continuously and consumes significant tokens."

