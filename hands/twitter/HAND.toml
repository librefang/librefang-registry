id = "twitter"
version = "1.0.0"
name = "Twitter Hand"
description = "Autonomous Twitter/X manager — content creation, scheduled posting, engagement, and performance tracking"

category = "communication"
icon = "\U0001D54F"
tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

[routing]
aliases = [
  "twitter",
  "tweet",
  "x.com",
  "scheduled tweet",
  "post tweet",
  "twitter thread",
]
weak_aliases = [
  "social media post",
  "engagement tracking",
  "twitter management",
  "tweet scheduler",
]

[[requires]]
key = "TWITTER_BEARER_TOKEN"
label = "Twitter API Bearer Token"
requirement_type = "api_key"
check_value = "TWITTER_BEARER_TOKEN"
description = "A Bearer Token from the Twitter/X Developer Portal. Required for reading and posting tweets via the Twitter API v2."

[requires.install]
signup_url = "https://developer.twitter.com/en/portal/dashboard"
docs_url = "https://developer.twitter.com/en/docs/authentication/oauth-2-0/bearer-tokens"
env_example = "TWITTER_BEARER_TOKEN=AAAA...your_token_here"
estimated_time = "5-10 min"
steps = [
  "Go to developer.twitter.com and sign in with your Twitter/X account",
  "Create a new Project and App (free tier is fine for reading)",
  "Navigate to your App's 'Keys and tokens' page",
  "Generate a Bearer Token under 'Authentication Tokens'",
  "Copy the token and set it as an environment variable",
  "Restart LibreFang or reload config for the change to take effect",
]

[[requires]]
key = "TWITTER_API_KEY"
label = "Twitter API Key (Consumer Key)"
requirement_type = "api_key"
check_value = "TWITTER_API_KEY"
optional = true
description = "OAuth 1.0a Consumer Key. Optional — only needed for user-context operations (liking, retweeting, following as a specific user)."

[requires.install]
signup_url = "https://developer.twitter.com/en/portal/dashboard"
docs_url = "https://developer.twitter.com/en/docs/authentication/oauth-1-0a"
env_example = "TWITTER_API_KEY=your_api_key_here"
estimated_time = "5-10 min"
steps = [
  "Go to developer.twitter.com and open your App settings",
  "Navigate to 'Keys and tokens' page",
  "Copy the 'API Key' (also called Consumer Key)",
  "Set it as TWITTER_API_KEY environment variable",
]

[[requires]]
key = "TWITTER_API_SECRET"
label = "Twitter API Secret (Consumer Secret)"
requirement_type = "api_key"
check_value = "TWITTER_API_SECRET"
optional = true
description = "OAuth 1.0a Consumer Secret. Optional — only needed alongside TWITTER_API_KEY for user-context operations."

[requires.install]
signup_url = "https://developer.twitter.com/en/portal/dashboard"
docs_url = "https://developer.twitter.com/en/docs/authentication/oauth-1-0a"
