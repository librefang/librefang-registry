id = "linkedin"
version = "1.0.0"
name = "LinkedIn Hand"
description = "Autonomous LinkedIn manager — profile optimization, content creation, networking, and professional engagement"

category = "communication"
icon = "\U0001F4BC"
tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

[routing]
aliases = ["linkedin", "profile optimization", "professional networking"]
weak_aliases = ["professional engagement", "linkedin post"]

[[requires]]
key = "LINKEDIN_ACCESS_TOKEN"
label = "LinkedIn API Access Token"
requirement_type = "api_key"
check_value = "LINKEDIN_ACCESS_TOKEN"
description = "An OAuth 2.0 access token from the LinkedIn Developer Portal. Required for posting content and managing your LinkedIn presence."

[requires.install]
signup_url = "https://www.linkedin.com/developers/apps"
docs_url = "https://learn.microsoft.com/en-us/linkedin/shared/authentication/authorization-code-flow"
env_example = "LINKEDIN_ACCESS_TOKEN=your_access_token_here"
estimated_time = "10-15 min"
steps = [
  "Go to linkedin.com/developers/apps and sign in",
  "Create a new app (requires a LinkedIn Page for verification)",
  "Request the w_member_social, profile, and openid OAuth scopes",
  "Complete OAuth 2.0 authorization code flow to obtain an access token",
  "Set LINKEDIN_ACCESS_TOKEN as an environment variable",
  "Restart LibreFang or reload config for the change to take effect",
]

