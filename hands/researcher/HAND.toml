id = "researcher"
version = "1.0.0"
name = "Researcher Hand"
description = "Autonomous deep researcher — exhaustive investigation, cross-referencing, fact-checking, and structured reports"

category = "productivity"
icon = "🧪"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

[routing]
aliases = [
  "deep research",
  "systematic review",
  "landscape analysis",
  "exhaustive investigation",
  "investigate",
  "research topic",
  "find sources",
  "fact check",
]
