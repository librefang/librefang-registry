description = "Autonomous lead generation — discovers, enriches, and delivers qualified leads on a schedule"

category = "data"
icon = "📊"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
